<section>
    <div style="display: flex; justify-content: end;">
        {{btn_create}}
    </div>
    {{list_content}}
</section>
<dialog id="id_modal_create" class="modal" style="
    margin: auto; 
    border: none; 
    padding: 2rem;
    background: white; 
">
    {{form_create_content}}
</dialog>
<script>
    document.querySelector('#id_modal_create form').onsubmit = async (e) => {
        e.preventDefault();
        await fetch(e.target.action, {
            method: 'POST',
            body: new FormData(e.target)
        });
        window.location.reload();
    };
</script>
