services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    working_dir: /app
    command: >
      sh -c "composer install --ignore-platform-req=ext-gd &&
             php -S 0.0.0.0:8000 -t public"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - school-network
  db:
      image: mysql:8.0
      environment:
        MYSQL_DATABASE: gestao_escolar
        MYSQL_USER: user
        MYSQL_PASSWORD: root
        MYSQL_ROOT_PASSWORD: root
      ports:
        - "3306:3306"
      healthcheck:
        test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uuser", "-proot"]
        interval: 5s
        timeout: 5s
        retries: 10
      networks:
        - school-network
networks:
  school-network:
    driver: bridge
