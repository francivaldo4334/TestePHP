services:
  app:
    image: php:8.3-cli
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    working_dir: /app
    command: >
      sh -c "docker-php-ext-install pdo_mysql && 
             php -S 0.0.0.0:8000 -t public"
    depends_on:
      - db
    networks:
      - school-network
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: gestao_escolar
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    networks:
      - school-network
networks:
  school-network:
    driver: bridge
